name: Deploy rich-birthday to Pages

# Builds the `rich-birthday` render and publishes it to GitHub Pages.
# Served at https://fabianlander.github.io/low-vertex-flat-tori/

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to push to Pages, and let the action mint an OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight run mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Produces a self-contained dist/rich-birthday/ (base: './' makes it
      # path-agnostic, so it serves correctly at the Pages root).
      - run: npm run build rich-birthday

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/rich-birthday

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
